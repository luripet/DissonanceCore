name: Build
on:
  push:
    paths-ignore:
      - "**/*.md"

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout DissonanceCore
        uses: actions/checkout@v4

      - name: Checkout DissonanceBuilds
        uses: actions/checkout@v4
        with:
          repository: luripet/DissonanceBuilds
          path: builds
          token: ${{ secrets.BUILDS_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: npm i -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build --release-branch=${{ github.ref_name }} --build-minify

      - name: Push Build Artifacts
        run: |
          cd "$GITHUB_WORKSPACE/builds"
          git checkout -B "$GITHUB_REF_NAME"
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R "$GITHUB_WORKSPACE/dist/." .
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Build $GITHUB_SHA"
          git push --set-upstream origin "$GITHUB_REF_NAME"

      - name: Purge CDN Cache
        run: |
          curl -fsSL "https://purge.jsdelivr.net/gh/luripet/DissonanceBuilds@${{ github.ref_name }}/dissonance.js" || true
          curl -fsSL "https://purge.jsdelivr.net/gh/luripet/DissonanceBuilds@${{ github.ref_name }}/dissonance.min.js" || true
