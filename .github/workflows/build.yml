name: Build
on:
  push:
    paths-ignore:
      - "**/*.md"

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout DissonanceCore
        uses: actions/checkout@v4

      - name: Clone DissonanceBuilds
        env:
          BUILDS_REPO: luripet/DissonanceBuilds
          BUILDS_TOKEN: ${{ secrets.BUILDS_TOKEN }}
        run: |
          set -euo pipefail
          remote_url="https://x-access-token:${BUILDS_TOKEN}@github.com/${BUILDS_REPO}.git"
          git clone "$remote_url" "$GITHUB_WORKSPACE/builds"
          git -C "$GITHUB_WORKSPACE/builds" fetch origin "+refs/heads/*:refs/remotes/origin/*" || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: npm i -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build --release-branch=${{ github.ref_name }} --build-minify

      - name: Push Build Artifacts
        run: |
          cd "$GITHUB_WORKSPACE/builds"
          if git show-ref --verify --quiet "refs/remotes/origin/$GITHUB_REF_NAME"; then
            git checkout -B "$GITHUB_REF_NAME" "refs/remotes/origin/$GITHUB_REF_NAME"
          elif git rev-parse --verify HEAD >/dev/null 2>&1; then
            git checkout -B "$GITHUB_REF_NAME"
          else
            git checkout --orphan "$GITHUB_REF_NAME"
          fi
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R "$GITHUB_WORKSPACE/dist/." .
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Build $GITHUB_SHA"
          git push --set-upstream origin "$GITHUB_REF_NAME"

      - name: Purge CDN Cache
        run: |
          curl -fsSL "https://purge.jsdelivr.net/gh/luripet/DissonanceBuilds@${{ github.ref_name }}/dissonance.js" || true
          curl -fsSL "https://purge.jsdelivr.net/gh/luripet/DissonanceBuilds@${{ github.ref_name }}/dissonance.min.js" || true
